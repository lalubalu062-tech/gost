<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Engine - Pro Testing</title>
    <style>
        /* Background UI - Testing ke time hide rakhenge */
        body { margin: 0; padding: 0; background-color: #0b0c10; font-family: sans-serif; height: 100vh; overflow: hidden; }
        
        /* TAB 1: MAIN BLOG (Full Screen) */
        #ghost-browser { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: white; z-index: 100; overflow: auto; color: black;
            border: 8px solid #ffaa00; box-sizing: border-box;
        }
        
        /* TAB 2: VIRTUAL POPUP (Full Screen Modal) */
        #ghost-popup {
            display: none; position: fixed; top: 5%; left: 5%; width: 90vw; height: 90vh;
            background: white; z-index: 200; border: 8px solid #00ffcc;
            overflow: auto; color: black; box-shadow: 0 0 50px rgba(0,0,0,0.8);
            border-radius: 10px;
        }

        /* LIVE TRACKING BARS */
        .status-bar { 
            background: #111; color: #fff; padding: 12px; font-weight: bold; 
            text-align: center; position: sticky; top: 0; z-index: 999; 
            font-size: 16px; font-family: monospace; border-bottom: 2px solid #555;
        }
        .error-msg { color: red; text-align: center; margin-top: 50px; font-weight: bold; font-family: sans-serif; }
    </style>
</head>
<body>

    <div id="ghost-browser">
        <div class="status-bar" id="status1">🟧 TAB 1 (Main Blog) - Request Bhej Raha Hai...</div>
        <div id="browser-content" style="padding:15px; text-align: center; margin-top: 20px;">
            <h2>⏳ Loading Blog Data...</h2>
        </div>
    </div>
    
    <div id="ghost-popup">
        <div class="status-bar" id="status2">🟦 TAB 2 (Popup Post) - Link Click Hone Ka Wait Kar Raha Hai...</div>
        <div id="popup-content" style="padding:15px;"></div>
    </div>

    <script>
        const ghostBrowser = document.getElementById('browser-content');
        const ghostPopup = document.getElementById('ghost-popup');
        const popupContent = document.getElementById('popup-content');
        const status1 = document.getElementById('status1');
        const status2 = document.getElementById('status2');
        
        const mainBlogUrl = "https://updategoli.blogspot.com"; 

        async function startGhostEngine() {
            try {
                const renderLandingUrl = window.location.href;
                
                // Backend ko request
                const response = await fetch(`/proxy-browser?target_url=${encodeURIComponent(mainBlogUrl)}&referer_url=${encodeURIComponent(renderLandingUrl)}`);
                
                // ERROR CATCHER: Agar backend fail hua toh ye pakad lega
                if (!response.ok) {
                    ghostBrowser.innerHTML = `<h2 class="error-msg">❌ HTTP Error ${response.status}: Backend Proxy Fail!<br>Bhai, ek baar check kar lo ki main.py update hua hai ya nahi.</h2>`;
                    status1.innerText = "🟧 TAB 1 - SYSTEM HALTED (Error)";
                    return;
                }

                const html = await response.text();
                ghostBrowser.innerHTML = html;
                status1.innerText = "🟧 TAB 1 - Blog Loaded! Tedha-medha scroll shuru...";
                
                // Random scroll limit (1000px se 1500px)
                const finalScrollTarget = Math.floor(Math.random() * 500) + 1000;
                startRandomScroll(document.getElementById('ghost-browser'), 0, finalScrollTarget, simulateRandomClick);
            } catch (error) {
                ghostBrowser.innerHTML = `<h2 class="error-msg">❌ Network/Fetch Error: ${error.message}</h2>`;
            }
        }

        function startRandomScroll(element, currentScroll, maxScroll, callback) {
            if (currentScroll >= maxScroll) {
                status1.innerText = "🟧 TAB 1 - Scroll Pura Hua! Ab random link par click karega...";
                setTimeout(callback, 2000);
                return;
            }
            const randomStep = Math.floor(Math.random() * 200) + 100;
            element.scrollBy({ top: randomStep, behavior: 'smooth' });
            
            const randomTime = Math.floor(Math.random() * 1500) + 1500;
            setTimeout(() => {
                startRandomScroll(element, currentScroll + randomStep, maxScroll, callback);
            }, randomTime);
        }

        async function simulateRandomClick() {
            const allLinks = Array.from(ghostBrowser.querySelectorAll('a'));
            // Sirf wahi links chhanenge jo tumhare blog ki proper posts hain
            const validLinks = allLinks.filter(a => a.href && a.href.includes('updategoli.blogspot.com/') && !a.href.includes('#'));

            if (validLinks.length > 0) {
                const randomSelectedLink = validLinks[Math.floor(Math.random() * validLinks.length)].href; 
                
                ghostPopup.style.display = 'block';
                status2.innerText = `🟦 TAB 2 - Nayi Post Fetch Kar Raha Hai (Fake Referrer: main blog)...`;

                try {
                    // Doosri request (Referrer spoofing ke sath)
                    const response = await fetch(`/proxy-browser?target_url=${encodeURIComponent(randomSelectedLink)}&referer_url=${encodeURIComponent(mainBlogUrl + "/")}`);
                    
                    if (!response.ok) {
                        popupContent.innerHTML = `<h2 class="error-msg">❌ Popup Error ${response.status}</h2>`;
                        return;
                    }

                    const popupHtml = await response.text();
                    popupContent.innerHTML = popupHtml;
                    status2.innerText = `🟦 TAB 2 - Nayi Post Loaded! Ab ye bhi scroll hogi...`;

                    const finalPopupScroll = Math.floor(Math.random() * 400) + 600;
                    startRandomScroll(document.getElementById('ghost-popup'), 0, finalPopupScroll, () => {
                        status2.innerText = `✅ MISSION SUCCESS: Dono tab me Human-Like reading complete!`;
                    });
                } catch (error) {
                    popupContent.innerHTML = `<h2 class="error-msg">❌ Popup Fetch Error: ${error.message}</h2>`;
                }
            } else {
                status1.innerText = "🟧 TAB 1 - Koi clickable link nahi mila!";
            }
        }
        
        setTimeout(startGhostEngine, 1500);
    </script>
</body>
</html>
