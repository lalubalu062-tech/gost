<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Engine - Visual Tracker</title>
    <style>
        body { margin: 0; padding: 0; background-color: #0b0c10; font-family: sans-serif; height: 100vh; overflow: hidden; }
        
        /* TAB 1: MAIN BLOG */
        #ghost-browser { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: white; z-index: 100; overflow: auto; color: black;
            border: 8px solid #ffaa00; box-sizing: border-box;
        }
        
        /* TAB 2: VIRTUAL POPUP */
        #ghost-popup {
            display: none; position: fixed; top: 5%; left: 5%; width: 90vw; height: 90vh;
            background: white; z-index: 200; border: 8px solid #00ffcc;
            overflow: auto; color: black; box-shadow: 0 0 50px rgba(0,0,0,0.8);
            border-radius: 10px;
        }

        .status-bar { 
            background: #111; color: #fff; padding: 12px; font-weight: bold; 
            text-align: center; position: sticky; top: 0; z-index: 9999; 
            font-size: 16px; font-family: monospace; border-bottom: 2px solid #555;
        }
        .error-msg { color: red; text-align: center; margin-top: 50px; font-weight: bold; }

        /* --- 🔥 NEW VISUAL TRACKERS (Red Line & Green Plus) 🔥 --- */
        .red-scroll-line {
            position: absolute;
            left: 50%;
            width: 6px;
            height: 45px;
            background-color: #ff0000;
            box-shadow: 0 0 20px #ff0000;
            z-index: 9998;
            border-radius: 5px;
            pointer-events: none;
            transform: translateX(-50%);
        }
        
        .green-click-plus {
            position: fixed;
            color: #00ff00;
            font-size: 120px;
            font-weight: 900;
            text-shadow: 0 0 40px #00ff00, 3px 3px 5px black;
            z-index: 10000;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="ghost-browser">
        <div class="status-bar" id="status1">🟧 TAB 1 - Request Bhej Raha Hai...</div>
        <div id="browser-content"></div>
    </div>
    
    <div id="ghost-popup">
        <div class="status-bar" id="status2">🟦 TAB 2 - Popup Ready</div>
        <div id="popup-content" style="padding:15px;"></div>
    </div>

    <script>
        const ghostBrowser = document.getElementById('ghost-browser');
        const browserContent = document.getElementById('browser-content');
        const ghostPopup = document.getElementById('ghost-popup');
        const popupContent = document.getElementById('popup-content');
        const status1 = document.getElementById('status1');
        const status2 = document.getElementById('status2');
        
        const mainBlogUrl = "https://updategoli.blogspot.com"; 

        async function startGhostEngine() {
            try {
                const renderLandingUrl = window.location.href;
                const response = await fetch(`/proxy-browser?target_url=${encodeURIComponent(mainBlogUrl)}&referer_url=${encodeURIComponent(renderLandingUrl)}`);
                
                if (!response.ok) {
                    browserContent.innerHTML = `<h2 class="error-msg">❌ HTTP Error ${response.status}</h2>`;
                    return;
                }

                const html = await response.text();
                browserContent.innerHTML = html;
                status1.innerText = "🟧 TAB 1 - Blog Loaded! Tedha-medha scroll shuru...";
                
                const finalScrollTarget = Math.floor(Math.random() * 800) + 1200;
                startRandomScroll(ghostBrowser, 0, finalScrollTarget, simulateRandomClick);
            } catch (error) {}
        }

        // RANDOM SCROLL & RED LINE GENERATOR
        function startRandomScroll(element, currentScroll, maxScroll, callback) {
            if (currentScroll >= maxScroll) {
                status1.innerText = "🟧 TAB 1 - Scroll Pura Hua! Target Link dhund raha hai...";
                setTimeout(callback, 2000);
                return;
            }
            const randomStep = Math.floor(Math.random() * 250) + 100;
            element.scrollBy({ top: randomStep, behavior: 'smooth' });
            
            // 🔴 LAL LINE BANAO JAHAN RUKA HAI
            let redLine = document.createElement('div');
            redLine.className = 'red-scroll-line';
            // Scroll ke hisaab se position set karna
            redLine.style.top = (element.scrollTop + (window.innerHeight / 2)) + 'px'; 
            browserContent.appendChild(redLine);
            
            const randomTime = Math.floor(Math.random() * 1500) + 1500;
            setTimeout(() => {
                startRandomScroll(element, currentScroll + randomStep, maxScroll, callback);
            }, randomTime);
        }

        // TARGET LINK & GREEN PLUS GENERATOR
        async function simulateRandomClick() {
            const allLinks = Array.from(browserContent.querySelectorAll('a'));
            const validLinks = allLinks.filter(a => a.href && a.href.includes('updategoli.blogspot.com/') && !a.href.includes('#'));

            if (validLinks.length > 0) {
                // Ekdum random link chuno
                const chosenLinkElement = validLinks[Math.floor(Math.random() * validLinks.length)];
                const randomSelectedLink = chosenLinkElement.href; 
                
                status1.innerText = "🟧 TAB 1 - Link Mil Gaya! Click karne jaa raha hai...";

                // Screen ko scroll karke us link ke paas le jao
                chosenLinkElement.scrollIntoView({ behavior: 'smooth', block: 'center' });

                // Thoda ruk kar Green Plus banao
                setTimeout(() => {
                    let rect = chosenLinkElement.getBoundingClientRect();
                    
                    // ✅ GREEN PLUS BANAO TARGET PAR
                    let greenPlus = document.createElement('div');
                    greenPlus.className = 'green-click-plus';
                    greenPlus.innerHTML = '+';
                    // Exact button/link ke coordinates
                    greenPlus.style.left = (rect.left + (rect.width / 2)) + 'px';
                    greenPlus.style.top = (rect.top + (rect.height / 2)) + 'px';
                    document.body.appendChild(greenPlus);

                    status1.innerText = "🟧 TAB 1 - 💥 CLICKED! Popup khulne wala hai...";

                    // Green plus dikhane ke 1.5 second baad popup kholo
                    setTimeout(async () => {
                        ghostPopup.style.display = 'block';
                        status2.innerText = `🟦 TAB 2 - Nayi Post Fetch Kar Raha Hai...`;

                        try {
                            const response = await fetch(`/proxy-browser?target_url=${encodeURIComponent(randomSelectedLink)}&referer_url=${encodeURIComponent(mainBlogUrl + "/")}`);
                            const popupHtml = await response.text();
                            popupContent.innerHTML = popupHtml;
                            status2.innerText = `🟦 TAB 2 - Nayi Post Loaded! Ab ye bhi scroll hogi...`;

                            const finalPopupScroll = Math.floor(Math.random() * 400) + 600;
                            // Naye tab mein red line nahi daali taaki screen mess na ho, par wo scroll hoga
                            startRandomScroll(ghostPopup, 0, finalPopupScroll, () => {
                                status2.innerText = `✅ MISSION SUCCESS: Dono tab me Human-Like reading complete!`;
                            });
                        } catch (error) {}
                    }, 1500);

                }, 800); // Scroll hone ke liye 0.8s ka wait

            } else {
                status1.innerText = "🟧 TAB 1 - Koi clickable link nahi mila!";
            }
        }
        
        setTimeout(startGhostEngine, 1500);
    </script>
</body>
</html>
